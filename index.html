<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classeur aviation — Base de révision par thème</title>
<style>
:root{
  --bg:#0F1822;--surface:#172430;--surface2:#1E2F3D;--raised:#243749;
  --ink:#E8EEF3;--muted:#869aab;--faint:#5d7384;
  --gold:#c9a24b;--gold-dim:rgba(201,162,75,.13);
  --blue:#4a9bbe;--blue-dim:rgba(74,155,190,.13);
  --green:#3FB984;--green-dim:rgba(63,185,132,.13);
  --red:#e2614b;--red-dim:rgba(226,97,75,.13);
  --line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.14);
  --sidebar:288px;
  --mono:ui-monospace,"SF Mono",Consolas,monospace;
  --sans:"Helvetica Neue",Arial,system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);display:flex;
  min-height:100vh;line-height:1.5;
  background-image:radial-gradient(900px 380px at 72% -160px,rgba(201,162,75,.07),transparent 70%);
  background-attachment:fixed}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar);flex:0 0 var(--sidebar);background:var(--surface);
  border-right:1px solid var(--line);height:100vh;position:sticky;top:0;
  overflow-y:auto;display:flex;flex-direction:column}
.sb-head{padding:18px 18px 14px;border-bottom:1px solid var(--line)}
.sb-head .eyebrow{font-family:var(--mono);font-size:9px;letter-spacing:3px;
  text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.sb-head .title{font-size:15px;font-weight:800;color:var(--ink);letter-spacing:-.01em;line-height:1.2}
.sb-head .sub{font-size:11px;color:var(--muted);margin-top:3px}
.prog{padding:13px 18px;border-bottom:1px solid var(--line)}
.prog-lab{font-family:var(--mono);font-size:10px;color:var(--muted);display:flex;
  justify-content:space-between;margin-bottom:6px}
.pbar{height:4px;background:var(--raised);border-radius:4px;overflow:hidden}
.pbar-fill{height:100%;background:var(--gold);border-radius:4px;transition:width .4s}
.nav{flex:1;padding:8px 0 20px}
.cat{margin-top:6px}
.cat-head{display:flex;align-items:center;gap:8px;padding:9px 18px 7px;cursor:pointer;
  font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--faint);user-select:none}
.cat-head:hover{color:var(--muted)}
.cat-head .dotc{width:7px;height:7px;border-radius:2px;flex:0 0 auto}
.cat-head .chev{margin-left:auto;font-family:var(--mono);font-size:9px;transition:transform .2s}
.cat.collapsed .chev{transform:rotate(-90deg)}
.cat.collapsed .themes{display:none}
.theme{display:flex;align-items:center;gap:9px;padding:7px 18px 7px 30px;font-size:12.5px;
  cursor:pointer;color:var(--muted);border-left:2px solid transparent;transition:.13s}
.theme:hover{color:var(--ink);background:rgba(255,255,255,.03)}
.theme.active{color:var(--gold);border-left-color:var(--gold);background:var(--gold-dim)}
.theme .tn{flex:1;line-height:1.25}
.theme .cnt{font-family:var(--mono);font-size:9px;background:var(--raised);color:var(--faint);
  padding:1px 6px;border-radius:10px;flex:0 0 auto}
.theme .cnt.done{background:var(--green-dim);color:var(--green)}
.theme .cnt.empty{opacity:.4}

/* ── MAIN ── */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:10;background:rgba(15,24,34,.93);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:11px 24px;
  display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.crumb{font-size:13px;font-weight:700;color:var(--ink);flex:0 0 auto;display:flex;align-items:center;gap:8px}
.crumb .cpill{font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;
  padding:2px 8px;border-radius:20px}
.search{flex:1;min-width:160px;max-width:380px;position:relative}
.search input{width:100%;background:var(--surface2);border:1px solid var(--line2);
  border-radius:20px;padding:7px 14px 7px 32px;color:var(--ink);font-size:12.5px;font-family:var(--sans)}
.search input:focus{outline:none;border-color:var(--gold)}
.search input::placeholder{color:var(--faint)}
.search .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:12px}
.fbtn{font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;
  padding:6px 12px;border-radius:20px;border:1px solid var(--line2);background:none;
  color:var(--muted);cursor:pointer;transition:.15s;flex:0 0 auto}
.fbtn:hover{color:var(--ink);border-color:var(--gold)}
.fbtn.active{background:var(--gold-dim);color:var(--gold);border-color:var(--gold)}
.content{padding:24px;max-width:880px}

/* ── THEME HEADER ── */
.th-header{margin-bottom:20px}
.th-header .cpill{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;
  padding:3px 9px;border-radius:20px;display:inline-block;margin-bottom:8px}
.th-header h2{font-size:23px;font-weight:800;color:var(--ink);letter-spacing:-.015em}
.th-header .meta{font-size:11.5px;color:var(--faint);margin-top:5px;font-family:var(--mono)}

/* ── FICHE ── */
.fiches{display:flex;flex-direction:column;gap:13px}
.fiche{background:var(--surface);border:1px solid var(--line);border-radius:13px;
  padding:17px 19px;transition:border-color .2s}
.fiche:hover{border-color:var(--line2)}
.fiche.su{opacity:.5}
.fiche-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:11px}
.fiche-title{font-size:14px;font-weight:800;color:var(--ink);line-height:1.25;letter-spacing:-.01em}
.tag{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;
  padding:2px 8px;border-radius:20px;white-space:nowrap;flex:0 0 auto}
.tag.procedure{background:var(--gold-dim);color:var(--gold)}
.tag.systeme{background:var(--blue-dim);color:var(--blue)}
.tag.acronyme{background:var(--green-dim);color:var(--green)}
.tag.retenir{background:var(--red-dim);color:var(--red)}
.fiche-body{font-size:12.5px;color:var(--muted);line-height:1.55}
.fiche-body ul{list-style:none}
.fiche-body li{padding:2.5px 0 2.5px 16px;position:relative}
.fiche-body li:before{content:"›";position:absolute;left:0;color:var(--gold);font-weight:700}
.fiche-body .kw{font-family:var(--mono);background:var(--raised);color:var(--ink);font-size:11px;
  padding:0 5px;border-radius:4px;font-weight:600}
.fiche-body .num{font-family:var(--mono);color:var(--gold);font-weight:700}
.fiche-body b{color:var(--ink);font-weight:700}
.warn{margin-top:11px;background:rgba(226,97,75,.1);border-left:2px solid var(--red);
  border-radius:0 6px 6px 0;padding:8px 11px;font-size:11.5px;color:var(--muted)}
.warn strong{color:var(--red);font-size:10px;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:3px}
.fiche-foot{margin-top:13px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.sources{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.src{font-family:var(--mono);font-size:9.5px;color:var(--faint);background:var(--surface2);
  border:1px solid var(--line);padding:2px 8px;border-radius:20px}
.src:before{content:"📹 ";font-family:var(--sans)}
.su-btn{font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;
  padding:5px 12px;border-radius:20px;border:1px solid var(--line2);background:none;
  color:var(--faint);cursor:pointer;transition:.15s}
.su-btn:hover{color:var(--green);border-color:var(--green)}
.fiche.su .su-btn{background:var(--green-dim);color:var(--green);border-color:var(--green)}

/* search result theme label */
.res-theme{font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;
  color:var(--faint);margin-bottom:8px;display:flex;align-items:center;gap:6px}

/* empty */
.empty{text-align:center;padding:56px 24px;color:var(--faint)}
.empty .ico{font-size:30px;margin-bottom:14px;opacity:.6}
.empty p{font-size:13px;max-width:420px;margin:0 auto;line-height:1.6}
.empty .small{font-size:11.5px;margin-top:8px;color:var(--faint)}

@media(max-width:760px){
  body{flex-direction:column}
  .sidebar{width:100%;height:auto;position:relative}
  .content{padding:16px}
}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sb-head">
    <div class="eyebrow">✈ Classeur aviation</div>
    <div class="title">Base de révision par thème</div>
    <div class="sub">Préparation sélection pilote</div>
  </div>
  <div class="prog">
    <div class="prog-lab"><span>Fiches maîtrisées</span><span id="prog-txt">0 / 0</span></div>
    <div class="pbar"><div class="pbar-fill" id="prog-bar" style="width:0%"></div></div>
  </div>
  <nav class="nav" id="nav"></nav>
</aside>

<div class="main">
  <div class="topbar">
    <div class="crumb" id="crumb">Tous les thèmes</div>
    <div class="search">
      <span class="si">⌕</span>
      <input type="text" id="search" placeholder="Rechercher dans toutes les fiches…" autocomplete="off">
    </div>
    <button class="fbtn" id="todoBtn" data-on="0">À revoir</button>
  </div>
  <div class="content" id="content"></div>
</div>

<script>
/* ════════ RÉFÉRENTIEL ════════ */
const CATEGORIES = [
  {id:'normal',  label:'Procédures normales',      color:'var(--gold)'},
  {id:'systemes',label:'Systèmes',                 color:'var(--blue)'},
  {id:'urgences',label:'Anormales & urgences',     color:'var(--red)'},
  {id:'general', label:'Connaissances',            color:'var(--green)'},
];
const THEMES = [
  {id:'miseenroute', cat:'normal',   label:'Mise en route & allumage moteurs'},
  {id:'roulage',     cat:'normal',   label:'Roulage'},
  {id:'decollage',   cat:'normal',   label:'Décollage & après décollage'},
  {id:'envol',       cat:'normal',   label:'En vol (montée & croisière)'},
  {id:'approche',    cat:'normal',   label:'Approche & atterrissage'},
  {id:'elec',        cat:'systemes', label:'Électrique & APU'},
  {id:'carbu',       cat:'systemes', label:'Carburant'},
  {id:'hydro',       cat:'systemes', label:'Hydraulique'},
  {id:'moteurs',     cat:'systemes', label:'Moteurs'},
  {id:'commandes',   cat:'systemes', label:'Commandes & freinage'},
  {id:'depress',     cat:'urgences', label:'Dépressurisation'},
  {id:'panne_mot',   cat:'urgences', label:'Perte / panne moteur'},
  {id:'nav',         cat:'general',  label:'Navigation'},
  {id:'glossaire',   cat:'general',  label:'Glossaire'},
];
const SOURCES = {
  b737_mer:'Mise en route — B737 NG (simu)',
  a320_vent:'Atterrissage par vent fort — A320 (simu)',
};
function catColor(id){return (CATEGORIES.find(c=>c.id===id)||{}).color||'var(--muted)';}
function catLabel(id){return (CATEGORIES.find(c=>c.id===id)||{}).label||'';}
function themeObj(id){return THEMES.find(t=>t.id===id);}

/* ════════ FICHES ════════ */
const S=['b737_mer'];
const FICHES=[
/* MISE EN ROUTE */
{id:'a1',th:'miseenroute',tag:'retenir',src:S,title:'Contexte de la mise en route',bullets:[
  'La mise en route se fait au <b>poste de stationnement (contact)</b>, jamais sur la piste',
  'À l\'arrivée dans le cockpit : <b>tout est éteint (OFF)</b>',
  'On suit <b>toujours une checklist</b> — jamais de mémoire, sauf les procédures d\'urgence',
  'Vidéo = mise en route <b>générique et pédagogique</b>, pas la procédure officielle exacte']},
{id:'e1',th:'miseenroute',tag:'procedure',src:S,title:'La batterie — procédure',bullets:[
  'Rôle : <b>amorcer les autres systèmes</b>. Elle ne "travaille" pas, elle lance',
  'Interrupteur protégé par un <b>cache</b> → 2 gestes (évite la coupure accidentelle)',
  'Procédure : soulever le cache → basculer sur <span class="kw">ON</span>',
  'Résultat : <b>alarme "sur batterie"</b> (normale)',
  'Durée max sur batterie : <span class="num">15 minutes</span>'],
  warn:'Couper la batterie en vol = critique. Le cache empêche ce geste involontaire.'},
{id:'p2',th:'miseenroute',tag:'procedure',src:S,title:'Démarrage de l\'APU — séquence',bullets:[
  '<b>1.</b> Batterie <span class="kw">ON</span>',
  '<b>2.</b> Pompe carburant APU <span class="kw">ON</span> (amène le kérosène à l\'APU)',
  '<b>3.</b> Sélecteur APU <span class="kw">OFF/ON/START</span> → appuyer <b>START</b>',
  '<b>4.</b> <b>Top chrono</b> (temps limite constructeur)',
  '<b>5.</b> Température monte → voyants s\'allument',
  '<b>6.</b> Voyant "électricité disponible" → APU OK → alarme batterie coupée']},
{id:'m1',th:'miseenroute',tag:'retenir',src:S,title:'Principe du démarrage moteur — 3 étapes',bullets:[
  '<b>1. Rotation à sec</b> — air APU injecté → "effet éolienne" → le moteur tourne sans carburant',
  '<b>2. Injection</b> — à <span class="num">~20 % N2</span> : robinet kérosène + étincelles → combustion',
  '<b>3. Autonomie</b> — la flamme s\'entretient seule → on coupe étincelles et air APU'],
  warn:'Analogie : un briquet. L\'étincelle lance la flamme mais n\'est plus nécessaire ensuite.'},
{id:'m2',th:'miseenroute',tag:'procedure',src:S,title:'Démarrage moteur — séquence opérationnelle',bullets:[
  '<b>1.</b> Ouvrir la valve <span class="kw">BLEED</span> (air) de l\'APU',
  '<b>2.</b> Sélecteur <span class="kw">ENGINE START → GRD</span> (sol)',
  '<b>3.</b> <span class="kw">START VALVE OPEN</span> → l\'air entre, moteur tourne',
  '<b>4.</b> Top chrono',
  '<b>5.</b> À <span class="num">~20 % N2</span> → ouvrir le robinet kérosène',
  '<b>6.</b> Surveiller l\'<span class="kw">EGT</span> qui monte, main sur le robinet',
  '<b>7.</b> Si EGT trop haute → couper le kérosène',
  '<b>8.</b> Stabilisé → EGT ~<span class="num">460 °C</span>, ralenti ~<span class="num">21 % N1</span>',
  '<b>9.</b> Sélecteur revient <b>seul sur OFF</b> → répéter pour l\'autre moteur']},
{id:'m4',th:'miseenroute',tag:'retenir',src:S,title:'Sécurité température au démarrage',bullets:[
  'L\'EGT monte brutalement à l\'injection — normal',
  'EGT au-delà de la limite → <b>couper le kérosène immédiatement</b>',
  'Puis ventiler à vide (refroidir) → relancer',
  '<b>Top chrono systématique</b> : temps dépassé → problème',
  '<span class="kw">FADEC</span> = gestion électronique moteurs (anti-pompage auto)']},
{id:'b1',th:'miseenroute',tag:'procedure',src:S,title:'Bascule électricité APU → moteurs',bullets:[
  'Brancher <span class="kw">GEN 2</span> (moteur droit) puis <span class="kw">GEN 1</span> (moteur gauche)',
  'L\'APU se déconnecte mais reste <b>disponible</b> (affiché en bleu)']},
{id:'b2',th:'miseenroute',tag:'procedure',src:S,title:'Bascule air + coupure APU',bullets:[
  'Prendre l\'<b>air des moteurs</b> (au lieu de l\'APU)',
  'Enclencher les <span class="kw">PACKS</span> (air cabine)',
  'Couper l\'air APU → APU sur <span class="kw">OFF</span>',
  'Rien n\'est perdu ; l\'APU reste rallumable en vol (secours)']},
{id:'s2',th:'miseenroute',tag:'procedure',src:S,title:'Systèmes à enclencher avant départ',bullets:[
  '<span class="kw">Yaw damper</span> (amortisseur de lacet)',
  'Signe <b>"Attachez vos ceintures"</b>',
  '<b>Dégivrage</b> pare-brise + <span class="kw">sondes Pitot</span> (vitesse air)',
  'Pompes hydrauliques électriques A et B',
  '<b>Feux anticollision</b> (rouges) : <b>avant</b> la mise en route moteur',
  '<b>Phares de roulage</b> avant de bouger'],
  warn:'Les feux anticollision s\'allument AVANT les moteurs : ils préviennent le personnel au sol.'},

/* ROULAGE */
{id:'d6',th:'roulage',tag:'systeme',src:S,title:'Contrôle au sol',bullets:[
  'Direction : <b>palonniers</b> (pédales) + <b>roulette de nez</b> (manette dédiée à gauche, pas le volant)',
  'Freins : au <b>bout des palonniers</b> (pied droit = frein roue droite)',
  'Le volant contrôle l\'<b>inclinaison (roulis)</b> → ne tourne pas au sol']},

/* DÉCOLLAGE */
{id:'d1',th:'decollage',tag:'procedure',src:S,title:'Check avant décollage — fondamentaux',bullets:[
  '✓ Assez de <b>kérosène</b> ? Réservoirs <b>ouverts</b> ? <b>Pompes ON</b> ?',
  '✓ <b>Volets</b> sortis (ex. <span class="num">5</span>) → vérifier l\'affichage réel',
  '✓ <b>Train</b> sur <span class="kw">DOWN</span> ?',
  '✓ <b>Aérofreins</b> armés ? <b>Freinage auto RTO</b> ?',
  '✓ <b>Frein de parc</b> desserré ?'],
  warn:'Valable de l\'ULM à l\'A380. Principe constant : "action → vérification".'},
{id:'d2',th:'decollage',tag:'systeme',src:S,title:'Les volets (flaps)',bullets:[
  'À <b>basse vitesse</b> : besoin de plus de portance',
  'Les volets <b>augmentent surface et courbure</b> de l\'aile',
  'Sortis pour décollage (ex. 5) et atterrissage',
  'Toujours <b>contrôler la position réelle</b> affichée']},
{id:'d3',th:'decollage',tag:'systeme',src:S,title:'Train d\'atterrissage',bullets:[
  'Manette sur <span class="kw">DOWN</span> obligatoire au sol',
  'Pas sur UP au sol : en prenant de la portance le train s\'allège → rentrerait → <b>ventre</b>',
  'Rentrée : sur ordre, une fois <b>variomètre positif</b>',
  'En haut : <b>verrouillé mécaniquement</b> → sélecteur OFF']},
{id:'d4',th:'decollage',tag:'procedure',src:S,title:'Séquence de poussée',bullets:[
  '<b>1.</b> Stabiliser à <span class="num">40 % N1</span> (vibrations, température, pression d\'huile)',
  '   → de 40 % à 90 %, les moteurs montent <b>ensemble</b>',
  '<b>2.</b> Passer à <span class="num">90 % N1</span> = poussée décollage',
  '<b>3.</b> Main manette / main manche / pieds palonniers'],
  warn:'Jamais de 0 % à 90 % direct : les moteurs ne monteraient pas de façon synchrone.'},
{id:'d5',th:'decollage',tag:'acronyme',src:['b737_mer','a320_vent'],title:'V1 · VR — les vitesses clés',bullets:[
  '<span class="kw">V1</span> = vitesse de <b>décision</b> : avant → on peut interrompre (RTO) ; après → on décolle',
  '<span class="kw">VR</span> = vitesse de <b>rotation</b> : on tire le manche → assiette ~<span class="num">15°</span>',
  'Plus de piste visible → décollé ; variomètre positif → <b>"gear up"</b>',
  'Ex. A320 (vent fort) : V1 annoncée à <span class="num">128 kt</span>']},
{id:'ap1',th:'decollage',tag:'procedure',src:S,title:'Checklist après décollage',bullets:[
  '<b>1.</b> Pressurisation vérifiée',
  '<b>2.</b> Train : sélecteur <span class="kw">OFF</span> (verrouillé mécaniquement)',
  '<b>3.</b> Volets confirmés rentrés → voyant éteint',
  '<b>4.</b> Freinage auto désarmé',
  '<b>5.</b> Signe ceintures coupé si vol stabilisé']},

/* EN VOL */
{id:'ap2',th:'envol',tag:'procedure',src:S,title:'Navigation en montée',bullets:[
  'Afficher un <b>cap</b> → suivre le <b>trait rose</b> du ND (trajectoire cible)',
  '<b>Palier d\'accélération</b> ("bug up") → rentrer les volets par étapes (ex. 170 kt) puis accélérer (ex. 250 kt)',
  '<b>Interception d\'altitude</b> : alarme ~<span class="num">1 000 ft</span> avant le palier',
  '<span class="kw">Ground speed</span> ≠ <span class="kw">Airspeed</span> : l\'écart = effet du vent']},

/* ÉLECTRIQUE & APU */
{id:'a2',th:'elec',tag:'retenir',src:S,title:'Les 3 sources d\'énergie au sol',bullets:[
  '<b>Batterie</b> — base, temporaire (<span class="num">15 min max</span>)',
  '<b>APU</b> <span class="kw">Auxiliary Power Unit</span> — réacteur arrière : électricité + air',
  '<b>GPU</b> <span class="kw">Ground Power Unit</span> — groupe de parc aéroport, payant',
  'En vol : ce sont les <b>générateurs des moteurs</b>'],
  warn:'GPU ≠ APU. Le GPU est externe (aéroport) ; l\'APU est intégré (queue de l\'avion).'},
{id:'e2',th:'elec',tag:'systeme',src:S,title:'Les générateurs',bullets:[
  '<span class="num">2 générateurs</span> principaux (entraînés par les moteurs)',
  'Règle : <b>toujours 2 branchés</b> simultanément',
  '<span class="kw">GEN 1</span> = moteur gauche / <span class="kw">GEN 2</span> = moteur droit (jamais "gauche/droite")',

/* ════════ PERSISTANCE ════════ */
const KEY='af_classeur_v2';
let DB={};
try{const r=localStorage.getItem(KEY);if(r)DB=JSON.parse(r);}catch(e){}
function save(){try{localStorage.setItem(KEY,JSON.stringify(DB));}catch(e){}}
function isSu(id){return !!DB[id];}
function toggleSu(id){DB[id]=!DB[id];if(!DB[id])delete DB[id];save();}

/* ════════ STATE ════════ */
let activeTheme=THEMES[0].id;
let query='';
let todoOnly=false;
let collapsed={};

/* ════════ HELPERS ════════ */
function fichesOf(th){return FICHES.filter(f=>f.th===th);}
function tagLabel(t){return{procedure:'Procédure',systeme:'Système',acronyme:'Acronyme',retenir:'À retenir'}[t]||t;}

/* ════════ SIDEBAR ════════ */
function renderNav(){
  const nav=document.getElementById('nav');
  nav.innerHTML=CATEGORIES.map(c=>{
    const themes=THEMES.filter(t=>t.cat===c.id);
    const isCol=collapsed[c.id];
    return `<div class="cat${isCol?' collapsed':''}" data-cat="${c.id}">
      <div class="cat-head"><span class="dotc" style="background:${c.color}"></span>${c.label}<span class="chev">▾</span></div>
      <div class="themes">${themes.map(t=>{
        const fs=fichesOf(t.id);const done=fs.filter(f=>isSu(f.id)).length;
        const cls=fs.length===0?'empty':(done===fs.length?'done':'');
        return `<div class="theme${activeTheme===t.id&&!query?' active':''}" data-theme="${t.id}">
          <span class="tn">${t.label}</span><span class="cnt ${cls}">${fs.length?done+'/'+fs.length:'—'}</span></div>`;
      }).join('')}</div>
    </div>`;
  }).join('');
}

/* ════════ PROGRESS ════════ */
function renderProgress(){
  const total=FICHES.length, done=FICHES.filter(f=>isSu(f.id)).length;
  document.getElementById('prog-txt').textContent=`${done} / ${total}`;
  document.getElementById('prog-bar').style.width=`${total?done/total*100:0}%`;
}

/* ════════ FICHE ════════ */
function ficheHTML(f,withTheme){
  const su=isSu(f.id);
  const srcs=(f.src||[]).map(s=>`<span class="src">${SOURCES[s]||s}</span>`).join('');
  return `<div class="fiche${su?' su':''}">
    ${withTheme?`<div class="res-theme"><span class="dotc" style="display:inline-block;width:7px;height:7px;border-radius:2px;background:${catColor(themeObj(f.th).cat)}"></span>${themeObj(f.th).label}</div>`:''}
    <div class="fiche-top"><div class="fiche-title">${f.title}</div><span class="tag ${f.tag}">${tagLabel(f.tag)}</span></div>
    <div class="fiche-body"><ul>${f.bullets.map(b=>`<li>${b}</li>`).join('')}</ul>
      ${f.warn?`<div class="warn"><strong>⚠ Point de vigilance</strong>${f.warn}</div>`:''}</div>
    <div class="fiche-foot"><div class="sources">${srcs}</div>
      <button class="su-btn" data-id="${f.id}">${su?'✓ Maîtrisé':'Marquer maîtrisé'}</button></div>
  </div>`;
}

/* ════════ CONTENT ════════ */
function renderContent(){
  const content=document.getElementById('content');
  const crumb=document.getElementById('crumb');

  if(query){
    const q=query.toLowerCase();
    let res=FICHES.filter(f=>{
      const hay=(f.title+' '+f.bullets.join(' ')+' '+themeObj(f.th).label).toLowerCase().replace(/<[^>]+>/g,'');
      return hay.includes(q);
    });
    if(todoOnly)res=res.filter(f=>!isSu(f.id));
    crumb.innerHTML=`Recherche · <span style="color:var(--muted);font-weight:400">${res.length} résultat${res.length>1?'s':''}</span>`;
    content.innerHTML=res.length?`<div class="fiches">${res.map(f=>ficheHTML(f,true)).join('')}</div>`
      :`<div class="empty"><div class="ico">⌕</div><p>Aucune fiche ne correspond à « ${query} ».</p></div>`;
    return;
  }

  const t=themeObj(activeTheme);
  crumb.innerHTML=`<span class="cpill" style="background:rgba(255,255,255,.05);color:${catColor(t.cat)}">${catLabel(t.cat)}</span> ${t.label}`;
  let fs=fichesOf(activeTheme);
  if(todoOnly)fs=fs.filter(f=>!isSu(f.id));

  let head=`<div class="th-header"><div class="cpill" style="background:rgba(255,255,255,.05);color:${catColor(t.cat)}">${catLabel(t.cat)}</div><h2>${t.label}</h2>${fichesOf(activeTheme).length?`<div class="meta">${fichesOf(activeTheme).length} fiche${fichesOf(activeTheme).length>1?'s':''}</div>`:''}</div>`;

  if(!fichesOf(activeTheme).length){
    content.innerHTML=head+`<div class="empty"><div class="ico">✈</div><p>Ce thème est prêt mais encore vide.</p><p class="small">Il se remplira automatiquement quand une vidéo abordera ce sujet — sans dupliquer ce qui existe déjà ailleurs.</p></div>`;
    return;
  }
  if(!fs.length){
    content.innerHTML=head+`<div class="empty"><div class="ico">✓</div><p>Toutes les fiches de ce thème sont maîtrisées.</p></div>`;
    return;
  }
  content.innerHTML=head+`<div class="fiches">${fs.map(f=>ficheHTML(f,false)).join('')}</div>`;
}

function renderAll(){renderNav();renderProgress();renderContent();}

/* ════════ ÉVÉNEMENTS ════════ */
document.getElementById('nav').addEventListener('click',e=>{
  const th=e.target.closest('[data-theme]');
  if(th){activeTheme=th.dataset.theme;query='';document.getElementById('search').value='';renderAll();
    document.querySelector('.content').scrollIntoView({behavior:'smooth',block:'start'});return;}
  const ch=e.target.closest('.cat-head');
  if(ch){const cat=ch.closest('.cat').dataset.cat;collapsed[cat]=!collapsed[cat];renderNav();return;}
});
document.getElementById('search').addEventListener('input',e=>{query=e.target.value.trim();renderContent();renderNav();});
document.getElementById('todoBtn').addEventListener('click',e=>{
  todoOnly=!todoOnly;const b=e.currentTarget;b.classList.toggle('active',todoOnly);renderContent();
});
document.getElementById('content').addEventListener('click',e=>{
  const btn=e.target.closest('.su-btn');if(!btn)return;
  toggleSu(btn.dataset.id);renderAll();
});

renderAll();
</script>
